<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AVIRA — Logo Concepts</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      background-color: #7e8285;
      background-image:
        linear-gradient(112deg,
          rgba(0,0,0,0.38) 0%, rgba(0,0,0,0.12) 16%,
          rgba(255,255,255,0.30) 28%, rgba(255,255,255,0.52) 40%,
          rgba(255,255,255,0.26) 52%, rgba(0,0,0,0.10) 64%,
          rgba(255,255,255,0.14) 78%, rgba(0,0,0,0.32) 100%
        ),
        repeating-linear-gradient(90deg,
          rgba(255,255,255,0.055) 0px, rgba(255,255,255,0.055) 1px,
          rgba(0,0,0,0.040) 1px, rgba(0,0,0,0.040) 2px,
          transparent 2px, transparent 3px
        );
      background-size: 100vw 100vh, 3px 100vh;
      background-attachment: fixed;
      min-height: 100vh;
      padding: 4rem 3rem;
      color: #0d0d0d;
    }
    h1 {
      font-size: 0.6rem;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: #1e2022;
      margin-bottom: 4rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
    }
    .card {
      background: rgba(255,255,255,0.07);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3.5rem 2rem 2.5rem;
      gap: 1.8rem;
    }
    .card-dark {
      background: #1e2022;
    }
    .label {
      font-size: 0.55rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(10,10,10,0.45);
    }
    .card-dark .label { color: rgba(255,255,255,0.3); }
  </style>
</head>
<body>

<h1>Avira — Logo Concepts</h1>

<div class="grid">

  <!-- 01 · Pure wordmark -->
  <div class="card">
    <svg width="220" height="60" viewBox="0 0 220 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <text x="110" y="30" text-anchor="middle"
        font-family="Jost, sans-serif" font-weight="200"
        font-size="28" letter-spacing="18" fill="#0d0d0d">AVIRA</text>
      <line x1="30" y1="46" x2="190" y2="46" stroke="#0d0d0d" stroke-width="0.5"/>
    </svg>
    <span class="label">01 · Wordmark</span>
  </div>

  <!-- 02 · A monogram + wordmark -->
  <div class="card">
    <svg width="180" height="80" viewBox="0 0 180 80" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Geometric A mark -->
      <line x1="90" y1="4" x2="72" y2="34" stroke="#0d0d0d" stroke-width="0.8"/>
      <line x1="90" y1="4" x2="108" y2="34" stroke="#0d0d0d" stroke-width="0.8"/>
      <line x1="78" y1="22" x2="102" y2="22" stroke="#0d0d0d" stroke-width="0.5"/>
      <!-- Wordmark below -->
      <text x="90" y="58" text-anchor="middle"
        font-family="Jost, sans-serif" font-weight="200"
        font-size="13" letter-spacing="11" fill="#0d0d0d">AVIRA</text>
      <text x="90" y="72" text-anchor="middle"
        font-family="Jost, sans-serif" font-weight="200"
        font-size="6" letter-spacing="4" fill="rgba(10,10,10,0.5)">OBJECTS OF PURPOSE</text>
    </svg>
    <span class="label">02 · Monogram + wordmark</span>
  </div>

  <!-- 03 · Circle seal (dark) -->
  <div class="card card-dark">
    <svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="80" cy="80" r="68" stroke="rgba(255,255,255,0.5)" stroke-width="0.6"/>
      <circle cx="80" cy="80" r="62" stroke="rgba(255,255,255,0.2)" stroke-width="0.4"/>
      <text x="80" y="88" text-anchor="middle"
        font-family="Jost, sans-serif" font-weight="200"
        font-size="22" letter-spacing="13" fill="#dfe1e2">AVIRA</text>
      <!-- Top arc text using textPath -->
      <defs>
        <path id="topArc" d="M 20,80 A 60,60 0 0,1 140,80"/>
        <path id="botArc" d="M 26,90 A 60,60 0 0,0 134,90"/>
      </defs>
      <text font-family="Jost, sans-serif" font-weight="200" font-size="5.5" letter-spacing="3.5" fill="rgba(255,255,255,0.4)">
        <textPath href="#topArc" startOffset="50%" text-anchor="middle">RECLAIMED · YACHT · MATERIALS</textPath>
      </text>
      <text font-family="Jost, sans-serif" font-weight="200" font-size="5.5" letter-spacing="3.5" fill="rgba(255,255,255,0.4)">
        <textPath href="#botArc" startOffset="50%" text-anchor="middle">OBJECTS OF PURPOSE</textPath>
      </text>
    </svg>
    <span class="label" style="color:rgba(255,255,255,0.3)">03 · Circle seal</span>
  </div>

  <!-- 04 · Hull mark (V hull cross-section) -->
  <div class="card">
    <svg width="200" height="80" viewBox="0 0 200 80" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- V hull shape -->
      <polyline points="72,8 100,28 128,8" stroke="#0d0d0d" stroke-width="0.7" fill="none" stroke-linejoin="miter"/>
      <!-- Waterline -->
      <line x1="65" y1="8" x2="135" y2="8" stroke="#0d0d0d" stroke-width="0.4"/>
      <!-- Wordmark -->
      <text x="100" y="54" text-anchor="middle"
        font-family="Jost, sans-serif" font-weight="200"
        font-size="18" letter-spacing="13" fill="#0d0d0d">AVIRA</text>
      <text x="100" y="68" text-anchor="middle"
        font-family="Jost, sans-serif" font-weight="200"
        font-size="5.5" letter-spacing="4" fill="rgba(10,10,10,0.45)">OBJECTS OF PURPOSE</text>
    </svg>
    <span class="label">04 · Hull mark</span>
  </div>

  <!-- 05 · Brushed rule stack (dark) -->
  <div class="card card-dark">
    <svg width="200" height="70" viewBox="0 0 200 70" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Stacked rules of varying lengths — brushed grain reference -->
      <line x1="60" y1="10" x2="140" y2="10" stroke="rgba(255,255,255,0.6)" stroke-width="0.5"/>
      <line x1="50" y1="15" x2="150" y2="15" stroke="rgba(255,255,255,0.35)" stroke-width="0.4"/>
      <line x1="68" y1="20" x2="132" y2="20" stroke="rgba(255,255,255,0.2)" stroke-width="0.3"/>
      <!-- Wordmark -->
      <text x="100" y="46" text-anchor="middle"
        font-family="Jost, sans-serif" font-weight="200"
        font-size="20" letter-spacing="14" fill="#dfe1e2">AVIRA</text>
      <text x="100" y="60" text-anchor="middle"
        font-family="Jost, sans-serif" font-weight="200"
        font-size="5.5" letter-spacing="4" fill="rgba(255,255,255,0.35)">OBJECTS OF PURPOSE</text>
    </svg>
    <span class="label">05 · Brushed rule mark</span>
  </div>

  <!-- 06 · Anchor cross (compass rose simplified) -->
  <div class="card">
    <svg width="180" height="90" viewBox="0 0 180 90" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Thin cross mark -->
      <line x1="90" y1="4" x2="90" y2="30" stroke="#0d0d0d" stroke-width="0.6"/>
      <line x1="76" y1="17" x2="104" y2="17" stroke="#0d0d0d" stroke-width="0.6"/>
      <circle cx="90" cy="17" r="5.5" stroke="#0d0d0d" stroke-width="0.6" fill="none"/>
      <!-- Wordmark -->
      <text x="90" y="57" text-anchor="middle"
        font-family="Jost, sans-serif" font-weight="200"
        font-size="18" letter-spacing="12" fill="#0d0d0d">AVIRA</text>
      <text x="90" y="71" text-anchor="middle"
        font-family="Jost, sans-serif" font-weight="200"
        font-size="5.5" letter-spacing="4" fill="rgba(10,10,10,0.45)">OBJECTS OF PURPOSE</text>
    </svg>
    <span class="label">06 · Compass mark</span>
  </div>

</div>
</body>
</html>
