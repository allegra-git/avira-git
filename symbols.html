<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AVIRA — Symbol Concepts</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      min-height: 100vh;
      padding: 5vw;
      color: rgba(255,255,255,0.35);
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 0.5px solid rgba(255,255,255,0.1);
      padding-bottom: 2rem;
      margin-bottom: 5vw;
    }
    header h1 {
      font-size: 0.58rem;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }
    header span {
      font-size: 0.52rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: rgba(255,255,255,0.06);
    }
    .cell {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 5vw 3vw 3.5vw;
      gap: 2.5rem;
      aspect-ratio: 1;
    }
    .label {
      font-size: 0.5rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>

<header>
  <h1>Avira — Symbol Concepts</h1>
  <span>Geometric A Mark · 6 Directions</span>
</header>

<div class="grid">

  <!-- ─── 01 · INCIRCLE ──────────────────────────────────────
       The A's inscribed circle — tangent to both legs and base.
       The crossbar naturally connects the two tangency points.
       Pure mathematical beauty.                               -->
  <div class="cell">
    <svg viewBox="0 0 200 200" fill="none" width="160" height="160">
      <!-- Triangle A -->
      <polygon points="100,18 22,176 178,176"
        stroke="rgba(255,255,255,0.7)" stroke-width="0.7" fill="none"/>
      <!-- Inscribed circle (tangent to all 3 sides) -->
      <circle cx="100" cy="128" r="48"
        stroke="rgba(255,255,255,0.5)" stroke-width="0.6"/>
      <!-- Crossbar — connects the two tangency points on the legs -->
      <line x1="57" y1="106" x2="143" y2="106"
        stroke="rgba(255,255,255,0.7)" stroke-width="0.6"/>
      <!-- Centre dot -->
      <circle cx="100" cy="128" r="1.4" fill="rgba(255,255,255,0.6)"/>
    </svg>
    <span class="label">01 · Incircle</span>
  </div>

  <!-- ─── 02 · CIRCUMSCRIBED ─────────────────────────────────
       The A triangle inscribed in its circumscribed circle —
       every vertex touches the circle. Double ring. Apex as
       the north pole.                                         -->
  <div class="cell">
    <svg viewBox="0 0 200 200" fill="none" width="160" height="160">
      <!-- Outer ring -->
      <circle cx="100" cy="100" r="86"
        stroke="rgba(255,255,255,0.22)" stroke-width="0.5"/>
      <!-- Inner ring -->
      <circle cx="100" cy="100" r="80"
        stroke="rgba(255,255,255,0.5)" stroke-width="0.65"/>
      <!-- Triangle inscribed in circle r=80:
           apex at top (100,20), base at ±135° from apex -->
      <polygon points="100,20 40.1,160.1 159.9,160.1"
        stroke="rgba(255,255,255,0.75)" stroke-width="0.7" fill="none"/>
      <!-- Crossbar at golden ratio of height -->
      <line x1="62.9" y1="105" x2="137.1" y2="105"
        stroke="rgba(255,255,255,0.7)" stroke-width="0.6"/>
      <!-- Tick at apex (N) — between rings -->
      <line x1="100" y1="14" x2="100" y2="20"
        stroke="rgba(255,255,255,0.5)" stroke-width="0.8"/>
    </svg>
    <span class="label">02 · Circumscribed</span>
  </div>

  <!-- ─── 03 · PRISM ────────────────────────────────────────
       Midpoint subdivision — connecting the three edge
       midpoints reveals an inverted inner triangle (the
       natural counter of A). A circle inscribed in the inner
       triangle.                                              -->
  <div class="cell">
    <svg viewBox="0 0 200 200" fill="none" width="160" height="160">
      <!-- Outer triangle -->
      <polygon points="100,18 18,178 182,178"
        stroke="rgba(255,255,255,0.6)" stroke-width="0.65" fill="none"/>
      <!-- Inner inverted triangle (midpoints of outer) -->
      <!-- Left-mid (59,98), Right-mid (141,98), Base-mid (100,178) -->
      <polygon points="59,98 141,98 100,178"
        stroke="rgba(255,255,255,0.45)" stroke-width="0.55" fill="none"/>
      <!-- Incircle of inner triangle: cx=100, cy=124, r=25 -->
      <circle cx="100" cy="124" r="25"
        stroke="rgba(255,255,255,0.35)" stroke-width="0.5"/>
      <!-- Crossbar on outer A (coincides with top edge of inner triangle) -->
      <line x1="59" y1="98" x2="141" y2="98"
        stroke="rgba(255,255,255,0.65)" stroke-width="0.6"/>
      <!-- Centre dot -->
      <circle cx="100" cy="124" r="1.2" fill="rgba(255,255,255,0.5)"/>
    </svg>
    <span class="label">03 · Prism</span>
  </div>

  <!-- ─── 04 · HORIZON ──────────────────────────────────────
       Three nested A triangles sharing one apex, decreasing
       in size like depth contours — or the horizon receding
       at sea. One shared crossbar threads all three.         -->
  <div class="cell">
    <svg viewBox="0 0 200 200" fill="none" width="160" height="160">
      <!-- Large triangle (100%) -->
      <polygon points="100,20 22,176 178,176"
        stroke="rgba(255,255,255,0.65)" stroke-width="0.7" fill="none"/>
      <!-- Medium triangle (66%) — base at y=123 -->
      <polygon points="100,20 49,123 151,123"
        stroke="rgba(255,255,255,0.38)" stroke-width="0.55" fill="none"/>
      <!-- Small triangle (33%) — base at y=72 -->
      <polygon points="100,20 75,72 125,72"
        stroke="rgba(255,255,255,0.2)" stroke-width="0.45" fill="none"/>
      <!-- Single crossbar on large triangle -->
      <line x1="57" y1="106" x2="143" y2="106"
        stroke="rgba(255,255,255,0.65)" stroke-width="0.6"/>
      <!-- Apex dot -->
      <circle cx="100" cy="20" r="1.4" fill="rgba(255,255,255,0.55)"/>
    </svg>
    <span class="label">04 · Horizon</span>
  </div>

  <!-- ─── 05 · HULL SECTION ─────────────────────────────────
       The A as a yacht's transverse hull cross-section —
       the two legs become curved hull strakes bowing outward,
       the base is the waterline. A craftsman's mark.         -->
  <div class="cell">
    <svg viewBox="0 0 200 200" fill="none" width="160" height="160">
      <!-- Outer circle ring — frame of reference -->
      <circle cx="100" cy="106" r="86"
        stroke="rgba(255,255,255,0.18)" stroke-width="0.5"/>
      <!-- Left hull strake: curved arc bowing outward -->
      <path d="M 100 22 Q 28 84 22 178"
        stroke="rgba(255,255,255,0.65)" stroke-width="0.7" fill="none"/>
      <!-- Right hull strake: mirror -->
      <path d="M 100 22 Q 172 84 178 178"
        stroke="rgba(255,255,255,0.65)" stroke-width="0.7" fill="none"/>
      <!-- Inner straight A legs (structural frame) -->
      <line x1="100" y1="22" x2="38" y2="178"
        stroke="rgba(255,255,255,0.28)" stroke-width="0.5"/>
      <line x1="100" y1="22" x2="162" y2="178"
        stroke="rgba(255,255,255,0.28)" stroke-width="0.5"/>
      <!-- Waterline (base) -->
      <line x1="22" y1="178" x2="178" y2="178"
        stroke="rgba(255,255,255,0.5)" stroke-width="0.6"/>
      <!-- Crossbar / deck beam -->
      <line x1="55" y1="108" x2="145" y2="108"
        stroke="rgba(255,255,255,0.65)" stroke-width="0.6"/>
      <!-- Keel point -->
      <circle cx="100" cy="22" r="1.4" fill="rgba(255,255,255,0.6)"/>
    </svg>
    <span class="label">05 · Hull Section</span>
  </div>

  <!-- ─── 06 · COMPASS A ────────────────────────────────────
       The A as a navigation instrument — inscribed in a
       compass ring. Apex = North. Eight tick marks. The
       crossbar sits exactly on the East–West axis.           -->
  <div class="cell">
    <svg viewBox="0 0 200 200" fill="none" width="160" height="160">
      <!-- Outer ring -->
      <circle cx="100" cy="100" r="88"
        stroke="rgba(255,255,255,0.25)" stroke-width="0.5"/>
      <!-- Inner ring -->
      <circle cx="100" cy="100" r="80"
        stroke="rgba(255,255,255,0.55)" stroke-width="0.65"/>
      <!-- Cardinal ticks (between rings, pointing inward) -->
      <!-- N — bold -->
      <line x1="100" y1="12" x2="100" y2="20"
        stroke="rgba(255,255,255,0.8)" stroke-width="1.2"/>
      <!-- S -->
      <line x1="100" y1="180" x2="100" y2="188"
        stroke="rgba(255,255,255,0.4)" stroke-width="0.7"/>
      <!-- E -->
      <line x1="180" y1="100" x2="188" y2="100"
        stroke="rgba(255,255,255,0.4)" stroke-width="0.7"/>
      <!-- W -->
      <line x1="12" y1="100" x2="20" y2="100"
        stroke="rgba(255,255,255,0.4)" stroke-width="0.7"/>
      <!-- Intercardinal ticks — tiny -->
      <line x1="162.2" y1="37.8" x2="157.6" y2="42.4"
        stroke="rgba(255,255,255,0.22)" stroke-width="0.5"/>
      <line x1="37.8" y1="37.8" x2="42.4" y2="42.4"
        stroke="rgba(255,255,255,0.22)" stroke-width="0.5"/>
      <line x1="162.2" y1="162.2" x2="157.6" y2="157.6"
        stroke="rgba(255,255,255,0.22)" stroke-width="0.5"/>
      <line x1="37.8" y1="162.2" x2="42.4" y2="157.6"
        stroke="rgba(255,255,255,0.22)" stroke-width="0.5"/>
      <!-- A inscribed — apex at N (100,20), base corners on E/W circle -->
      <polygon points="100,20 32,148 168,148"
        stroke="rgba(255,255,255,0.75)" stroke-width="0.7" fill="none"/>
      <!-- Crossbar at E–W axis level -->
      <line x1="55" y1="104" x2="145" y2="104"
        stroke="rgba(255,255,255,0.7)" stroke-width="0.6"/>
      <!-- Centre dot -->
      <circle cx="100" cy="100" r="1.5" fill="rgba(255,255,255,0.5)"/>
    </svg>
    <span class="label">06 · Compass</span>
  </div>

</div>

</body>
</html>
